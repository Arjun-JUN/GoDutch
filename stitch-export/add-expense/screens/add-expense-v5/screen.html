<input class="bg-transparent border-none focus:ring-0 text-5xl font-headline font-bold text-primary w-full p-0 placeholder:text-outline-variant/20" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
<!-- Description Input -->
<div class="relative">
<label class="block text-[11px] font-bold tracking-widest uppercase text-on-surface-variant/70 mb-4 ml-2">Description</label>
<div class="flex items-center bg-surface-container-low border border-transparent focus-within:border-primary/30 focus-within:bg-white rounded-[2rem] px-8 py-6 transition-all duration-300 shadow-sm">
